name: Docker Image CI

env:
  NODE_VERSION: 22
  CI: false

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'charts/**'
      - '.github/workflows/**'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: kaributechsworkflow/rwanda-track-web:${{ github.sha }}

      - name: Update deployment.yaml
        run: |
          cd charts/DEV
          sed -i "s|appVersion:.*|appVersion: '${{ github.sha }}'|" deployment.yaml
          sed -i "s|kaributechsworkflow/rwanda-track-web:.*|kaributechsworkflow/rwanda-track-web:${{ github.sha }}|" deployment.yaml
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add deployment.yaml
          git commit -m "Update deployment.yaml with image tag ${{ github.sha }}" || echo "No changes to commit"

      - name: Push changes to the repository
        run: |
          git pull --rebase
          git push

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            🚀 ${{ github.actor }} pushed to *${{ github.repository }}*!
            Commit message: _${{ github.event.head_commit.message }}_
